<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Operator Login</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #eef2ff;
      font-family: Arial, sans-serif;
      color: #1e293b;
    }

    .card {
      width: min(420px, calc(100vw - 24px));
      background: #fff;
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(30, 41, 59, 0.12);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 22px;
    }

    p {
      margin: 0 0 16px;
      color: #64748b;
      font-size: 14px;
    }

    label {
      display: block;
      font-size: 13px;
      margin: 10px 0 6px;
      font-weight: 700;
    }

    input {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      padding: 10px;
      font-size: 14px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      margin-top: 14px;
      border: none;
      border-radius: 10px;
      background: #4f46e5;
      color: #fff;
      padding: 11px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    ul {
      margin: 0 0 12px;
      padding: 10px 12px;
      border-radius: 8px;
      background: #fee2e2;
      color: #991b1b;
      font-size: 13px;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>Operator Login</h1>
    <p>Sign in once before supervised kiosk voting begins.</p>

    {% if form.errors %}
    <ul>
      <li>Invalid username or password.</li>
    </ul>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <label for="id_username">Username</label>
      <input type="text" name="username" id="id_username" required autofocus />

      <label for="id_password">Password</label>
      <input type="password" name="password" id="id_password" required />

      <button type="submit">Login</button>
    </form>
  </div>
</body>

</html>
